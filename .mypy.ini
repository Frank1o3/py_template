[mypy]

# ── Strictness ──────────────────────────────────
strict = True
# strict already enables:
#   disallow_untyped_defs, disallow_any_generics,
#   disallow_subclassing_any, no_implicit_optional,
#   warn_return_any, and more — don't re-list them

# ── Output ──────────────────────────────────────
pretty = True
show_error_codes = True
show_column_numbers = True

# ── Warnings ────────────────────────────────────
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
warn_unreachable = True

# ── Imports ─────────────────────────────────────
# False = error on untyped third-party libs
# Add per-module overrides below for libs without stubs
ignore_missing_imports = False
follow_imports = normal
namespace_packages = True

# ── Exclude ─────────────────────────────────────
exclude = (?x)(^build/  | ^dist/  | ^\.venv/ | ^venv/ | ^env)

# Cache
cache_dir = .cache/mypy

# ── Per-module overrides ─────────────────────────
# Add entries here when a dep has no stubs:
# [mypy-some_untyped_lib.*]
# ignore_missing_imports = True

[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False
warn_unreachable = False
